<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work — Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* ─── BASE STYLES (Matching your Home) ─── */
        :root {
            --cream: #f5f3ee;
            --white: #ffffff;
            --ink: #0e0e0e;
            --ink-60: rgba(14,14,14,0.6);
            --ink-20: rgba(14,14,14,0.12);
            --serif: 'Playfair Display', Georgia, serif;
            --sans: 'DM Sans', sans-serif;
        }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: var(--sans);
            margin: 0;
            overflow-x: hidden;
        }

        /* ─── WORK HEADER ─── */
        .work-header {
            padding: 160px 48px 80px;
            border-bottom: 1px solid var(--ink-20);
        }

        .work-eyebrow {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-60);
            margin-bottom: 20px;
            display: block;
        }

        .work-title {
            font-family: var(--serif);
            font-size: clamp(3rem, 8vw, 7rem);
            line-height: 1;
            font-weight: 400;
        }

        .work-title em { font-style: italic; color: var(--ink-60); }

        /* ─── FILTERS ─── */
        .filters {
            padding: 40px 48px;
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-btn {
            background: none;
            border: none;
            font-family: var(--sans);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-60);
            cursor: pointer;
            padding: 8px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        .filter-btn.active { color: var(--ink); }
        .filter-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 1px;
            background: var(--ink);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        .filter-btn.active::after { transform: scaleX(1); }

        /* ─── WORK GRID ─── */
        .work-grid {
            padding: 0 48px 100px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 40px;
        }

        .work-card {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .work-image-wrapper {
            width: 100%;
            aspect-ratio: 16/10;
            background: #e5e2db;
            overflow: hidden;
            margin-bottom: 24px;
            border-radius: 2px;
        }

        .work-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .work-card:hover img {
            transform: scale(1.05);
        }

        .work-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .work-card-title {
            font-family: var(--serif);
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .work-tags {
            font-size: 0.75rem;
            color: var(--ink-60);
            letter-spacing: 0.05em;
        }

        .work-year {
            font-family: var(--serif);
            font-style: italic;
            color: var(--ink-60);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .work-header { padding: 120px 24px 60px; }
            .work-grid { grid-template-columns: 1fr; padding: 0 24px 80px; }
            .filters { padding: 30px 24px; }
        }
    </style>
</head>
<body>

    <header class="work-header">
        <span class="work-eyebrow">Portfolio</span>
        <h1 class="work-title">Recent <em>Case</em><br>Studies.</h1>
    </header>

   <div class="filters">
    <button class="filter-btn active" onclick="filterSelection('all')">All Projects</button>
    <button class="filter-btn" onclick="filterSelection('design')">Web Design</button>
    <button class="filter-btn" onclick="filterSelection('dev')">Development</button>
    <button class="filter-btn" onclick="filterSelection('brand')">Branding</button>
</div>

<main class="work-grid">
    <a href="e-commers.html" class="work-card filter-item dev">
        <div class="work-image-wrapper">
            <img src="https://images.unsplash.com/photo-1467232004584-a241de8bcf5d?w=800" alt="Project">
        </div>
        <div class="work-info">
            <div>
                <h3 class="work-card-title">E-Commerce Experience</h3>
                <div class="work-tags">React / GSAP / Shopify</div>
            </div>
            <div class="work-year">2024</div>
        </div>
    </a>

    <a href="clothes-hanger.html" class="work-card filter-item design" style="margin-top: 40px;">
        <div class="work-image-wrapper">
            <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800" alt="Project">
        </div>
        <div class="work-info">
            <div>
                <h3 class="work-card-title">Creative Portfolio</h3>
                <div class="work-tags">UI Design / Figma</div>
            </div>
            <div class="work-year">2023</div>
        </div>
    </a>

    <a href="#" class="work-card filter-item brand">
        <div class="work-image-wrapper">
            <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800" alt="Project">
        </div>
        <div class="work-info">
            <div>
                <h3 class="work-card-title">Studio Identity</h3>
                <div class="work-tags">Brand Strategy / Logo</div>
            </div>
            <div class="work-year">2024</div>
        </div>
    </a>

    <a href="#" class="work-card filter-item dev" style="margin-top: 40px;">
        <div class="work-image-wrapper">
            <img src="https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=800" alt="Project">
        </div>
        <div class="work-info">
            <div>
                <h3 class="work-card-title">SaaS Platform</h3>
                <div class="work-tags">Next.js / Node.js</div>
            </div>
            <div class="work-year">2023</div>
        </div>
    </a>
</main>

<script>
    function filterSelection(category) {
        const items = document.querySelectorAll('.filter-item');
        const buttons = document.querySelectorAll('.filter-btn');

        // Update Active Button Style
        buttons.forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase().includes(category) || (category === 'all' && btn.innerText.includes('All'))) {
                btn.classList.add('active');
            }
        });

        // Filter Logic with GSAP Animation
        items.forEach(item => {
            // Pehle sabko hide karne ka animation
            gsap.to(item, {
                scale: 0.8,
                opacity: 0,
                duration: 0.3,
                display: 'none',
                ease: "power2.in",
                onComplete: () => {
                    // Phir category match hone par show karne ka animation
                    if (category === 'all' || item.classList.contains(category)) {
                        gsap.set(item, { display: 'block' });
                        gsap.to(item, {
                            scale: 1,
                            opacity: 1,
                            duration: 0.5,
                            ease: "power2.out"
                        });
                    }
                }
            });
        });
    }

    // Initial load: Show all
    window.onload = () => filterSelection('all');
</script>
</body>
</html>
